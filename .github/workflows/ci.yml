name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install tooling and gRPC deps (no torch)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install ruff pytest grpcio==1.68.1 grpcio-tools==1.68.1 protobuf==5.28.3 grpcio-testing==1.68.1

      - name: Generate protobuf / gRPC stubs
        run: python -m grpc_tools.protoc -I proto --python_out=proto --grpc_python_out=proto proto/health.proto

      - name: Ruff lint + format check
        run: |
          ruff check .
          ruff format --check .

      - name: Unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest test_server.py -q
